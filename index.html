        exp: "ROLLBACK (TCL command) undoes all changes made in the current transaction since the last COMMIT or SAVEPOINT. COMMIT permanently saves changes. ROLLBACK TO SAVEPOINT rolls back to a specific savepoint.",
      },
    ],
  },
};

const TABS = [
  { key: "toc", label: "Theory of Computation", icon: "⚙️" },
  { key: "ds", label: "Data Structures", icon: "🌲" },
  { key: "dbms", label: "DBMS", icon: "🗄️" },
];

const VIEWS = [
  { key: "pyq", label: "PYQs (2019–2024)" },
  { key: "practice", label: "Practice (25 Qs)" },
  { key: "answerkey", label: "Answer Key" },
];

function QuestionCard({ q, idx, showAns }) {
  const [revealed, setRevealed] = useState(false);
  const [selected, setSelected] = useState(null);
  const show = showAns || revealed;
  const color = q.id.startsWith("TOC") ? "#4f46e5" : q.id.startsWith("DS") ? "#0891b2" : "#059669";

  return (
    <div style={{
      background: "#1e1e2e",
      border: `1px solid ${color}33`,
      borderRadius: 12,
      padding: "1.2rem 1.4rem",
      marginBottom: "1.1rem",
    }}>
      <div style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 8 }}>
        <span style={{
          background: color + "22",
          color,
          borderRadius: 6,
          padding: "2px 10px",
          fontWeight: 700,
          fontSize: 12,
          flexShrink: 0,
        }}>Q{idx + 1}</span>
        {q.year && (
          <span style={{
            background: "#313244",
            color: "#cdd6f4",
            borderRadius: 6,
            padding: "2px 10px",
            fontSize: 11,
            fontWeight: 600,
          }}>{q.year}</span>
        )}
      </div>
      <p style={{ color: "#cdd6f4", fontSize: 14, lineHeight: 1.6, whiteSpace: "pre-line", marginBottom: 12 }}>
        {q.q}
      </p>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {q.opts.map((opt, i) => {
          const letter = opt[0];
          const isCorrect = letter === q.ans;
          const isSelected = selected === letter;
          let bg = "#313244";
          let border = "#45475a";
          let textColor = "#cdd6f4";
          if (show) {
            if (isCorrect) { bg = color + "22"; border = color; textColor = "#fff"; }
          } else if (isSelected) {
            bg = "#45475a"; border = "#cdd6f4";
          }
          return (
            <div
              key={i}
              onClick={() => !show && setSelected(letter)}
              style={{
                background: bg,
                border: `1px solid ${border}`,
                borderRadius: 8,
                padding: "8px 12px",
                color: textColor,
                fontSize: 13,
                cursor: show ? "default" : "pointer",
                display: "flex",
                alignItems: "center",
                gap: 8,
                transition: "all 0.15s",
              }}
            >
              {show && isCorrect && <span style={{ color }}>✓</span>}
              {opt}
            </div>
          );
        })}
      </div>
      {show && (
        <div style={{
          marginTop: 12,
          background: "#11111b",
          borderRadius: 8,
          padding: "10px 14px",
          borderLeft: `3px solid ${color}`,
        }}>
          <span style={{ color, fontWeight: 700, fontSize: 12 }}>✦ EXPLANATION: </span>
          <span style={{ color: "#a6adc8", fontSize: 13, lineHeight: 1.6 }}>{q.exp}</span>
        </div>
      )}
      {!show && (
        <button
          onClick={() => setRevealed(true)}
          style={{
            marginTop: 10,
            background: "transparent",
            border: `1px solid ${color}`,
            color,
            borderRadius: 6,
            padding: "5px 14px",
            fontSize: 12,
            cursor: "pointer",
            fontWeight: 600,
          }}
        >
          Reveal Answer
        </button>
      )}
    </div>
  );
}

function AnswerKey({ questions, label, color }) {
  return (
    <div>
      <h3 style={{ color: "#cdd6f4", fontSize: 15, marginBottom: 12 }}>{label} — Answer Key</h3>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead>
            <tr style={{ background: color + "22" }}>
              <th style={{ padding: "8px 12px", color, textAlign: "left", borderBottom: `1px solid ${color}33` }}>Q#</th>
              <th style={{ padding: "8px 12px", color, textAlign: "left", borderBottom: `1px solid ${color}33` }}>Year</th>
              <th style={{ padding: "8px 12px", color, textAlign: "left", borderBottom: `1px solid ${color}33` }}>Answer</th>
              <th style={{ padding: "8px 12px", color, textAlign: "left", borderBottom: `1px solid ${color}33`, maxWidth: 300 }}>Brief Explanation</th>
            </tr>
          </thead>
          <tbody>
            {questions.map((q, i) => (
              <tr key={q.id} style={{ borderBottom: "1px solid #313244" }}>
                <td style={{ padding: "7px 12px", color: "#cdd6f4", fontWeight: 700 }}>Q{i + 1}</td>
                <td style={{ padding: "7px 12px", color: "#a6adc8", fontSize: 11 }}>{q.year || "Practice"}</td>
                <td style={{ padding: "7px 12px" }}>
                  <span style={{ background: color + "22", color, borderRadius: 4, padding: "2px 8px", fontWeight: 700 }}>
                    {q.ans}
                  </span>
                </td>
                <td style={{ padding: "7px 12px", color: "#7f849c", fontSize: 12, maxWidth: 320 }}>
                  {q.exp.slice(0, 90)}{q.exp.length > 90 ? "..." : ""}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

export default function App() {
  const [activeTab, setActiveTab] = useState("toc");
  const [view, setView] = useState("pyq");
  const [showAll, setShowAll] = useState(false);

  const subject = data[activeTab];
  const questions = view === "pyq" ? subject.pyq : subject.practice;

  return (
    <div style={{
      minHeight: "100vh",
      background: "#11111b",
      fontFamily: "'Courier New', monospace",
      color: "#cdd6f4",
    }}>
      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #1e1e2e 0%, #181825 100%)",
        borderBottom: "1px solid #313244",
        padding: "1.2rem 1.5rem",
      }}>
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
            <span style={{ fontSize: 20 }}>📚</span>
            <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#cba6f7" }}>
              UGC NET JRF — CS Question Bank
            </h1>
          </div>
          <p style={{ margin: 0, fontSize: 12, color: "#6c7086" }}>
            PYQs (2019–2024) + 25 Practice Questions per topic | TOC · Data Structures · DBMS
          </p>
        </div>
      </div>

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "1.2rem 1rem" }}>
        {/* Subject Tabs */}
        <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
          {TABS.map(t => (
            <button
              key={t.key}
              onClick={() => { setActiveTab(t.key); setView("pyq"); setShowAll(false); }}
              style={{
                background: activeTab === t.key ? data[t.key].color : "#1e1e2e",
                border: `1px solid ${data[t.key].color}`,
                color: activeTab === t.key ? "#fff" : data[t.key].color,
                borderRadius: 8,
                padding: "7px 16px",
                fontWeight: 700,
                fontSize: 13,
                cursor: "pointer",
                transition: "all 0.15s",
              }}
            >
              {t.icon} {t.label}
            </button>
          ))}
        </div>

        {/* View Toggle */}
        <div style={{ display: "flex", gap: 6, marginBottom: 18, flexWrap: "wrap", alignItems: "center" }}>
          {VIEWS.map(v => (
            <button
              key={v.key}
              onClick={() => { setView(v.key); setShowAll(false); }}
              style={{
                background: view === v.key ? "#313244" : "transparent",
                border: `1px solid ${view === v.key ? "#45475a" : "#313244"}`,
                color: view === v.key ? "#cdd6f4" : "#6c7086",
                borderRadius: 6,
                padding: "5px 14px",
                fontSize: 12,
                cursor: "pointer",
                fontWeight: 600,
              }}
            >
              {v.label}
            </button>
          ))}
          {view !== "answerkey" && (
            <button
              onClick={() => setShowAll(!showAll)}
              style={{
                marginLeft: "auto",
                background: showAll ? "#f38ba822" : "transparent",
                border: `1px solid ${showAll ? "#f38ba8" : "#313244"}`,
                color: showAll ? "#f38ba8" : "#6c7086",
                borderRadius: 6,
                padding: "5px 14px",
                fontSize: 12,
                cursor: "pointer",
                fontWeight: 600,
              }}
            >
              {showAll ? "Hide All Answers" : "Show All Answers"}
            </button>
          )}
        </div>

        {/* Stats Bar */}
        {view !== "answerkey" && (
          <div style={{
            background: "#1e1e2e",
            border: `1px solid ${subject.color}33`,
            borderRadius: 10,
            padding: "10px 16px",
            marginBottom: 16,
            display: "flex",
            gap: 20,
            flexWrap: "wrap",
            fontSize: 12,
          }}>
            <span style={{ color: subject.color }}>
              📋 <strong>{questions.length}</strong> questions
            </span>
            <span style={{ color: "#a6adc8" }}>
              {view === "pyq" ? "🕐 Years: 2019–2024" : "🎯 Extra Practice Set"}
            </span>
            <span style={{ color: "#a6adc8" }}>
              ✦ Subject: <strong style={{ color: "#cdd6f4" }}>{subject.label}</strong>
            </span>
          </div>
        )}

        {/* Content */}
        {view === "answerkey" ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
            <AnswerKey questions={subject.pyq} label={`${subject.label} — Previous Year Questions`} color={subject.color} />
            <AnswerKey questions={subject.practice} label={`${subject.label} — Practice Questions`} color={subject.color} />
          </div>
        ) : (
          <div>
            {questions.map((q, i) => (
              <QuestionCard key={q.id} q={q} idx={i} showAns={showAll} />
            ))}
          </div>
        )}

        <div style={{ textAlign: "center", color: "#6c7086", fontSize: 11, padding: "1rem 0", marginTop: 8 }}>
          UGC NET June 2026 prep | Questions sourced from official NTA papers 2019–2024
        </div>
      </div>
    </div>
  );
}


  </script>
</body>
</html>
