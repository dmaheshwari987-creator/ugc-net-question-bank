<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UGC NET Question Bank</title>

  <!-- React + Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    #root {
      min-height: 100vh;
    }

    * {
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const data = {
      toc: {
        label: "Theory of Computation",
        color: "#4f46e5",
        accent: "#818cf8",
        pyq: [
          {
            id: "TOC-P1",
            year: "UGC NET Dec 2023",
            q: "Let L = {ab, aa, baa}. Which of the following strings are NOT in L*?",
            opts: [
              "A. abaabaaabaa",
              "B. aaaabaaaa",
              "C. baaaaabaaaab",
              "D. baaaaabaa",
            ],
            ans: "C",
            exp: "L* is the Kleene closure of L = {ab, aa, baa}. Strings in L* are formed by concatenating zero or more strings from L. 'baaaaabaaaab' cannot be formed by any concatenation of {ab, aa, baa}.",
          },
          {
            id: "TOC-P2",
            year: "UGC NET Dec 2023",
            q: "Match the set operations: (A) Φ ∩ {} (B) {} ∪ {} (C) {Φ, {}} - {} (D) ∪ {{}} with (I) {} (II) {} (III) {{}} (IV) {Φ, {}}",
            opts: [
              "A. (A)-(I), (B)-(II), (C)-(III), (D)-(IV)",
              "B. (A)-(II), (B)-(I), (C)-(III), (D)-(IV)",
              "C. (A)-(II), (B)-(I), (C)-(IV), (D)-(III)",
              "D. (A)-(I), (B)-(II), (C)-(IV), (D)-(III)",
            ],
            ans: "D",
            exp: "Φ ∩ {} = {} (empty set). {} ∪ {} = {}. {Φ, {}} - {} = {Φ, {}}. Union of {{}} = {}. Correct mapping is (A)-(I), (B)-(II), (C)-(IV), (D)-(III).",
          },
        ],
      },
      ds: {
        label: "Data Structures",
        color: "#0891b2",
        accent: "#67e8f9",
        pyq: [
          {
            id: "DS-P1",
            year: "UGC NET Dec 2023",
            q: "Which data structure is typically used to implement a hash table?",
            opts: [
              "A. Linked List",
              "B. Array",
              "C. Binary Tree",
              "D. Stack",
            ],
            ans: "B",
            exp: "Hash tables are typically implemented using arrays. The hash function maps a key to an array index.",
          },
        ],
      },
    };

    function App() {
      const [currentSubject, setCurrentSubject] = useState("toc");
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [showAnswer, setShowAnswer] = useState(false);
      const [selectedAnswer, setSelectedAnswer] = useState(null);

      const subject = data[currentSubject];
      const questions = subject.pyq;
      const question = questions[currentQuestion];

      return (
        <div style={{ padding: "20px" }}>
          <h1>📚 UGC NET Question Bank</h1>
          <div style={{ marginBottom: "20px" }}>
            <button
              onClick={() => {
                setCurrentSubject("toc");
                setCurrentQuestion(0);
                setShowAnswer(false);
                setSelectedAnswer(null);
              }}
              style={{
                padding: "10px 20px",
                marginRight: "10px",
                backgroundColor: currentSubject === "toc" ? "#4f46e5" : "#333",
                color: "white",
                border: "none",
                borderRadius: "5px",
                cursor: "pointer",
              }}
            >
              Theory of Computation
            </button>
            <button
              onClick={() => {
                setCurrentSubject("ds");
                setCurrentQuestion(0);
                setShowAnswer(false);
                setSelectedAnswer(null);
              }}
              style={{
                padding: "10px 20px",
                backgroundColor: currentSubject === "ds" ? "#0891b2" : "#333",
                color: "white",
                border: "none",
                borderRadius: "5px",
                cursor: "pointer",
              }}
            >
              Data Structures
            </button>
          </div>

          {question && (
            <div style={{ backgroundColor: "#1e293b", padding: "20px", borderRadius: "8px" }}>
              <p style={{ color: "#94a3b8" }}>
                Question {currentQuestion + 1} of {questions.length} • {question.year}
              </p>
              <h2>{question.q}</h2>
              <div style={{ marginTop: "20px" }}>
                {question.opts.map((opt, idx) => (
                  <button
                    key={idx}
                    onClick={() => setSelectedAnswer(idx)}
                    style={{
                      display: "block",
                      width: "100%",
                      padding: "12px",
                      margin: "8px 0",
                      backgroundColor:
                        selectedAnswer === idx ? subject.accent : "#334155",
                      color: "white",
                      border: "none",
                      borderRadius: "5px",
                      textAlign: "left",
                      cursor: "pointer",
                    }}
                  >
                    {opt}
                  </button>
                ))}
              </div>

              {selectedAnswer !== null && (
                <button
                  onClick={() => setShowAnswer(!showAnswer)}
                  style={{
                    padding: "10px 20px",
                    marginTop: "20px",
                    backgroundColor: subject.color,
                    color: "white",
                    border: "none",
                    borderRadius: "5px",
                    cursor: "pointer",
                  }}
                >
                  {showAnswer ? "Hide Answer" : "Show Answer"}
                </button>
              )}

              {showAnswer && (
                <div style={{ marginTop: "20px", backgroundColor: "#0f172a", padding: "15px", borderRadius: "5px" }}>
                  <p style={{ color: "#10b981" }}>
                    ✓ Correct Answer: <strong>{question.ans}</strong>
                  </p>
                  <p>{question.exp}</p>
                </div>
              )}

              <div style={{ marginTop: "30px" }}>
                <button
                  onClick={() => {
                    setCurrentQuestion(Math.max(0, currentQuestion - 1));
                    setShowAnswer(false);
                    setSelectedAnswer(null);
                  }}
                  disabled={currentQuestion === 0}
                  style={{
                    padding: "10px 20px",
                    marginRight: "10px",
                    backgroundColor: currentQuestion === 0 ? "#475569" : "#64748b",
                    color: "white",
                    border: "none",
                    borderRadius: "5px",
                    cursor: currentQuestion === 0 ? "not-allowed" : "pointer",
                  }}
                >
                  ← Previous
                </button>
                <button
                  onClick={() => {
                    setCurrentQuestion(Math.min(questions.length - 1, currentQuestion + 1));
                    setShowAnswer(false);
                    setSelectedAnswer(null);
                  }}
                  disabled={currentQuestion === questions.length - 1}
                  style={{
                    padding: "10px 20px",
                    backgroundColor: currentQuestion === questions.length - 1 ? "#475569" : "#64748b",
                    color: "white",
                    border: "none",
                    borderRadius: "5px",
                    cursor: currentQuestion === questions.length - 1 ? "not-allowed" : "pointer",
                  }}
                >
                  Next →
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
